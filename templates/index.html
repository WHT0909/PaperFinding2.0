<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioPapers - 文献检索系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">BioPapers</a>
            <ul class="nav-menu">
                <li><a href="/" class="active">检索</a></li>
                <li><a href="/assistant">文献助手</a></li>
                <li><a href="/about">关于</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <section class="search-section">
            <div class="search-container">
                <h1>BioPapers - 生物医学文献检索助手</h1>
                <p class="subtitle">从 PubMed 获取最新的学术文献</p>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="输入关键词搜索文献..." autocomplete="off">
                    <button id="searchBtn">搜索</button>
                </div>
            </div>
        </section>

        <section class="results-section" id="resultsSection" style="display: none;">
            <div class="results-header">
                <h2>搜索结果</h2>
                <span id="resultCount"></span>
            </div>
            <div class="results-container">
                <div class="filter-wrapper">
                    <aside class="filter-sidebar">
                        <div class="filter-section">
                            <h3 class="filter-title">发表日期</h3>
                            <div class="filter-options">
                                <label class="user-option">
                                    <input type="radio" name="dateFilter" value="all" checked>
                                    <span>全部</span>
                                </label>
                                <label class="user-option">
                                    <input type="radio" name="dateFilter" value="1">
                                    <span>近 1 年</span>
                                </label>
                                <label class="user-option">
                                    <input type="radio" name="dateFilter" value="5">
                                    <span>近 5 年</span>
                                </label>
                                <label class="user-option">
                                    <input type="radio" name="dateFilter" value="10">
                                    <span>近 10 年</span>
                                </label>
                            </div>
                    </aside>
                    <aside class="filter-sidebar">
                        <div class="filter-section">
                            <h3 class="filter-title">每页文献数量</h3>
                            <div class="filter-options">
                                <label class="user-option">
                                    <input type="radio" name="paperNumFilter" value="5" checked>
                                    <span>5</span>
                                </label>
                                <label class="user-option">
                                    <input type="radio" name="paperNumFilter" value="10">
                                    <span>10</span>
                                </label>
                                <label class="user-option">
                                    <input type="radio" name="paperNumFilter" value="15">
                                    <span>15</span>
                                </label>
                                <label class="user-option">
                                    <input type="radio" name="paperNumFilter" value="20">
                                    <span>20</span>
                                </label>
                            </div>
                    </aside>
                </div>
                <div class="results-content">
                    <div id="loading" class="loading" style="display: none;">
                        <div class="spinner"></div>
                        <p>正在检索...</p>
                    </div>
                    <div id="resultsList" class="results-list"></div>
                    <div class="pagination" id="pagination"></div>
                </div>
                </div>
            </div>
        </section>

        <section class="no-results" id="noResults" style="display: none;">
            <p>未找到相关文献，请尝试其他关键词</p>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 BioPapers. 基于 PubMed 文献数据库</p>
    </footer>

    <script src="/static/js/app.js"></script>
</body>
</html>
